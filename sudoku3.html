<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Game</title>
    <style>body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    
    .container {
        text-align: center;
    }
    
    h1 {background-color: rgb(249, 128, 23);
        font-size: 36px;
        color: blue;
        margin-bottom: 10px;
    }
    
    h2 {background-color: rgb(231, 241, 38);
        font-size: 24px;
        margin-bottom: 20px;
    }
    
    table {
        border-collapse: collapse;
        margin: 20px auto;
    }
    
    td {background-color: rgb(55, 199, 209);
        border: 1px solid #000;
        width: 40px;
        height: 40px;
        text-align: center;
        font-size: 20px;
        position: relative;
    }
    
    input {
        width: 100%;
        height: 100%;
        text-align: center;
        border: none;
        font-size: 20px;
        box-sizing: border-box;
    }
    
    input.incorrect {
        background-color: red;
        color: rgb(174, 206, 57);
    }
    
    #message {
        margin-top: 20px;
        font-size: 20px;
        color: green;
    }
    
    #chances {
        margin-top: 20px;
        font-size: 20px;
        color: red;
    }
    
    tr:nth-child(3) td,
    tr:nth-child(6) td {
        border-bottom: 3px solid #000;
    }
    
    td:nth-child(3),
    td:nth-child(6) {
        border-right: 3px solid #000;
    }
    </style>
</head>
<body>
    <div class="container">
        <h1>mini Games</h1>
        <h2>Sudoku Game</h2>
        <table id="sudoku-grid">
            <!-- Sudoku grid will be generated by JavaScript -->
        </table>
        <div id="message"></div>
        <div id="chances">Chances left: 3</div>
    </div>
    <script>const initialGrid = [
        [5, 3, 0, 0, 7, 0, 0, 0, 0],
        [6, 0, 0, 1, 9, 5, 0, 0, 0],
        [0, 9, 8, 0, 0, 0, 0, 6, 0],
        [8, 0, 0, 0, 6, 0, 0, 0, 3],
        [4, 0, 0, 8, 0, 3, 0, 0, 1],
        [7, 0, 0, 0, 2, 0, 0, 0, 6],
        [0, 6, 0, 0, 0, 0, 2, 8, 0],
        [0, 0, 0, 4, 1, 9, 0, 0, 5],
        [0, 0, 0, 0, 8, 0, 0, 7, 9]
    ];
    
    let chancesLeft = 3;
    
    document.addEventListener("DOMContentLoaded", () => {
        const grid = document.getElementById("sudoku-grid");
        for (let i = 0; i < 9; i++) {
            const row = document.createElement("tr");
            for (let j = 0; j < 9; j++) {
                const cell = document.createElement("td");
                const input = document.createElement("input");
                input.type = "text";
                input.maxLength = 1;
                input.id = `cell-${i}-${j}`;
                if (initialGrid[i][j] !== 0) {
                    input.value = initialGrid[i][j];
                    input.disabled = true;
                }
                input.addEventListener('input', checkSolution);
                cell.appendChild(input);
                row.appendChild(cell);
            }
            grid.appendChild(row);
        }
    });
    
    function getGridValues() {
        const grid = [];
        for (let i = 0; i < 9; i++) {
            const row = [];
            for (let j = 0; j < 9; j++) {
                const cellValue = document.getElementById(`cell-${i}-${j}`).value;
                row.push(cellValue ? parseInt(cellValue) : 0);
            }
            grid.push(row);
        }
        return grid;
    }
    
    function checkSolution() {
        const grid = getGridValues();
        let isValid = true;
    
        // Clear previous incorrect markings
        for (let i = 0; i < 9; i++) {
            for (let j = 0; j < 9; j++) {
                document.getElementById(`cell-${i}-${j}`).classList.remove("incorrect");
            }
        }
    
        let mistakes = 0;
        for (let i = 0; i < 9; i++) {
            for (let j = 0; j < 9; j++) {
                if (initialGrid[i][j] === 0 && !isValidEntry(grid, i, j, grid[i][j])) {
                    document.getElementById(`cell-${i}-${j}`).classList.add("incorrect");
                    isValid = false;
                    mistakes++;
                }
            }
        }
    
        if (mistakes > 0) {
            chancesLeft--;
            document.getElementById("chances").textContent = `Chances left: ${chancesLeft}`;
            if (chancesLeft <= 0) {
                document.getElementById("message").textContent = "You lost!";
                disableInputs();
            }
        } else if (isValid && isComplete(grid)) {
            document.getElementById("message").textContent = "You win!";
            disableInputs();
        } else {
            document.getElementById("message").textContent = "";
        }
    }
    
    function disableInputs() {
        for (let i = 0; i < 9; i++) {
            for (let j = 0; j < 9; j++) {
                document.getElementById(`cell-${i}-${j}`).disabled = true;
            }
        }
    }
    
    function isValidEntry(grid, row, col, num) {
        if (num === 0) return true;
    
        for (let x = 0; x < 9; x++) {
            if (grid[row][x] === num && x !== col) return false;
            if (grid[x][col] === num && x !== row) return false;
        }
    
        const startRow = Math.floor(row / 3) * 3;
        const startCol = Math.floor(col / 3) * 3;
        for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
                if (grid[startRow + i][startCol + j] === num && (startRow + i !== row || startCol + j !== col)) {
                    return false;
                }
            }
        }
        return true;
    }
    
    function isComplete(grid) {
        for (let i = 0; i < 9; i++) {
            for (let j = 0; j < 9; j++) {
                if (grid[i][j] === 0) return false;
            }
        }
        return true;
    }
    </script>
</body>
</html>
